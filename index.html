<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Card AR - Célula Animal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Model Viewer -->
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0A192F;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      width: 320px;
      background: #112240;
      border-radius: 12px;
      padding: 15px;
      text-align: center;
    }

    model-viewer {
      width: 100%;
      height: 220px;
      background: #000;
      border-radius: 10px;
    }

    button {
      margin-top: 10px;
      padding: 10px;
      width: 100%;
      border: none;
      border-radius: 8px;
      background: #00ADB5;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="card">

  <h2>Célula Animal</h2>

  <model-viewer 
    id="modeloAR"
    src="celula_animal.glb"
    ar
    ar-modes="scene-viewer webxr quick-look"
    camera-controls 
    auto-rotate>
  </model-viewer>
 
  <p>
    A célula animal é uma estrutura complexa com núcleo e organelas.
  </p>

  <button onclick="abrirAR()">Ver em RA</button>

</div>

<script>
function abrirAR() {
  const viewer = document.getElementById("modeloAR");
  viewer.activateAR();
}
</script>

</body>
</html>
</script>

</body>
</html>
